##############################################################################
# cloudbuild.yaml — Skill Platform 部署到 Google Cloud Run
#
# 触发方式:
#   gcloud builds submit --config cloudbuild.yaml .
##############################################################################

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── 构建主平台镜像 (server + web 合一) ─────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - asia-east1-docker.pkg.dev/gen-lang-client-0884226164/skill-platform/platform:$BUILD_ID
      - -t
      - asia-east1-docker.pkg.dev/gen-lang-client-0884226164/skill-platform/platform:latest
      - -f
      - Dockerfile
      - .

  # ── 构建沙箱镜像 (Cloud Run Job 用，与主镜像并行) ──────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-sandbox
    args:
      - build
      - -t
      - asia-east1-docker.pkg.dev/gen-lang-client-0884226164/skill-platform/sandbox:$BUILD_ID
      - -t
      - asia-east1-docker.pkg.dev/gen-lang-client-0884226164/skill-platform/sandbox:latest
      - -f
      - Dockerfile.sandbox
      - .
    waitFor: ['-']

  # ── Push 主镜像 ─────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - asia-east1-docker.pkg.dev/gen-lang-client-0884226164/skill-platform/platform
    waitFor: [build]

  # ── Push 沙箱镜像 ───────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-sandbox
    args:
      - push
      - --all-tags
      - asia-east1-docker.pkg.dev/gen-lang-client-0884226164/skill-platform/sandbox
    waitFor: [build-sandbox]

  # ── 部署主服务到 Cloud Run ───────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - skill-platform
      - --image=asia-east1-docker.pkg.dev/gen-lang-client-0884226164/skill-platform/platform:$BUILD_ID
      - --region=asia-east1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --set-env-vars=NODE_ENV=production,GCP_PROJECT_ID=gen-lang-client-0884226164,GCP_REGION=asia-east1,DB_SCHEMA=skill_platform,SERVICE_URL=https://skill-platform-yo5337ccva-de.a.run.app,SANDBOX_SECRET=sandbox-secret-2024,SANDBOX_JOB_IMAGE=asia-east1-docker.pkg.dev/gen-lang-client-0884226164/skill-platform/sandbox:latest,OAUTH_REDIRECT_URI=https://skill-platform-yo5337ccva-de.a.run.app/oauth-callback.html
      - --set-secrets=DATABASE_URL=skill-platform-db-url:latest,DOUBAO_API_KEY=skill-platform-doubao-key:latest,DEEPSEEK_API_KEY=skill-platform-deepseek-key:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest
    waitFor: [push]

  # ── 更新 Cloud Run Job（sandbox 沙箱，让它用最新的 sandbox:latest 镜像）────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: update-sandbox-job
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - skill-sandbox-job
      - --image=asia-east1-docker.pkg.dev/gen-lang-client-0884226164/skill-platform/sandbox:latest
      - --region=asia-east1
    waitFor: [push-sandbox]

images:
  - asia-east1-docker.pkg.dev/gen-lang-client-0884226164/skill-platform/platform:$BUILD_ID
  - asia-east1-docker.pkg.dev/gen-lang-client-0884226164/skill-platform/platform:latest
  - asia-east1-docker.pkg.dev/gen-lang-client-0884226164/skill-platform/sandbox:$BUILD_ID
  - asia-east1-docker.pkg.dev/gen-lang-client-0884226164/skill-platform/sandbox:latest
